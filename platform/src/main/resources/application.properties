# Platform app
server.port=8080

# H2 (file-based for persistence across restarts)
spring.datasource.url=jdbc:h2:file:./data/platform;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Platform: openspec work dir (default: current dir)
# platform.openspec-work-dir=/path/to/DevHome
# Optional: LLM endpoint for design generation
# platform.llm-endpoint=http://localhost:11434/v1
# Optional: Cursor API for triggering coding
# platform.cursor-api-endpoint=
