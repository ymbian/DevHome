# H2 as primary datasource (use when MySQL is not available, e.g. local dev).
# Activate with: spring.profiles.active=dev-h2

spring.datasource.url=jdbc:h2:file:./data/platform;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
