<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>设计文档</title>
    <link rel="stylesheet" href="/common.css?v=4">
    <style>
        textarea#design { min-height: 600px; font-family: monospace; font-size: 0.9rem; }
        #msg { margin: 0.5rem 0; color: var(--color-text); }
        #codingGuide { margin-top: 1rem; padding: 0.75rem; background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius); display: none; }
        .spec-switch { display: inline-flex; align-items: center; gap: 0.5rem; margin-left: 0.75rem; font-size: 0.95rem; vertical-align: middle; }
        .spec-switch .spec-toggle {
            appearance: none;
            -webkit-appearance: none;
            width: 42px;
            height: 24px;
            border-radius: 999px;
            border: 1px solid var(--color-border);
            background: var(--color-border);
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background var(--motion-duration), border-color var(--motion-duration);
        }
        .spec-switch .spec-toggle::before {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--color-bg-elevated);
            box-shadow: var(--shadow-sm);
            transition: transform var(--motion-duration);
        }
        .spec-switch .spec-toggle:checked {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        .spec-switch .spec-toggle:checked::before {
            transform: translateX(18px);
        }
        .spec-switch .spec-toggle:focus-visible {
            box-shadow: var(--shadow-focus);
        }
        .design-actions { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space); margin: 0.75rem 0; }
        .git-label { font-size: 0.9rem; color: var(--color-text-muted); margin-right: 0.25rem; }
        .git-input { flex: 1; min-width: 200px; }
    </style>
</head>
<body>
    <aside class="app-sidebar">
        <nav>
            <a href="/" data-nav="dev">开发</a>
            <a href="/tech.html" data-nav="tech">技改</a>
            <a href="/work-plan.html" data-nav="work-plan">工作计划</a>
        </nav>
    </aside>
    <main class="app-main">
        <h1>设计文档</h1>
        <p class="design-nav"><a href="/" class="link-back">返回需求列表</a> <span id="instanceId"></span></p>
        <button id="generate" class="btn">生成设计</button>
        <label class="spec-switch"><input type="checkbox" id="specMode" class="spec-toggle"> spec模式</label>
        <div class="design-actions">
            <label class="git-label">Git 仓库地址</label>
            <input type="text" id="gitUrl" class="git-input" placeholder="如 https://gitee.paas.cn/CCC00/H00_demo.git" />
            <button type="button" id="autoGitUrl" class="btn btn-outline">自动匹配</button>
            <button type="button" id="saveToGit" class="btn">保存到仓库</button>
        </div>
        <div id="msg"></div>
        <textarea id="design" placeholder="点击「生成设计」或在此编辑后保存..."></textarea>
        <div id="codingGuide"></div>
    </main>
    <script src="/shell.js"></script>
    <script>
        const id = (new URLSearchParams(location.search)).get('id');
        if (!id) { document.getElementById('msg').textContent = '缺少参数 id'; document.getElementById('design').disabled = true; }
        else {
            document.getElementById('instanceId').textContent = '实例: ' + id;
            fetch('/api/instances/' + id + '/design').then(r => r.ok ? r.json() : Promise.reject()).then(d => {
                document.getElementById('design').value = d.content || '';
            }).catch(() => { document.getElementById('msg').textContent = '加载失败'; });

            document.getElementById('generate').onclick = function () {
                document.getElementById('msg').textContent = '生成中...';
                var specModeEnabled = document.getElementById('specMode').checked;
                var url = '/api/instances/' + id + '/design/generate?specMode=' + (specModeEnabled ? 'true' : 'false');
                fetch(url, { method: 'POST' })
                    .then(r => r.ok ? r.json() : Promise.reject())
                    .then(d => {
                        document.getElementById('design').value = d.content || '';
                        if (!specModeEnabled) {
                            document.getElementById('msg').textContent = '已生成（spec模式关闭，未生成spec文件）';
                            return null;
                        }
                        if (d.specGenerated === 'true') {
                            document.getElementById('msg').textContent = '已生成（spec文件已生成）';
                            location.reload();
                            return null;
                        }
                        document.getElementById('msg').textContent = '设计已生成，但spec文件未生成';
                        return null;
                    })
                    .catch(() => { document.getElementById('msg').textContent = '生成失败'; });
            };
            document.getElementById('autoGitUrl').onclick = function () {
                document.getElementById('msg').textContent = '获取中...';
                fetch('/api/instances/' + id + '/git-url')
                    .then(function (r) {
                        if (r.status === 501) { document.getElementById('msg').textContent = '自动获取 Git 地址功能开发中'; return null; }
                        return r.ok ? r.json() : Promise.reject();
                    })
                    .then(function (d) {
                        if (d && d.gitUrl) {
                            document.getElementById('gitUrl').value = d.gitUrl;
                            document.getElementById('msg').textContent = '已填充 Git 地址';
                        } else if (d !== null) {
                            document.getElementById('msg').textContent = '暂无已配置的 Git 地址';
                        }
                    })
                    .catch(function () { document.getElementById('msg').textContent = '获取失败'; });
            };
            document.getElementById('saveToGit').onclick = function () {
                var gitUrl = (document.getElementById('gitUrl').value || '').trim();
                if (!gitUrl) {
                    document.getElementById('msg').textContent = '请先填写 Git 仓库地址';
                    return;
                }
                document.getElementById('msg').textContent = '保存中...';
                fetch('/api/instances/' + id + '/design/save-to-git', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gitUrl: gitUrl, content: document.getElementById('design').value })
                })
                    .then(function (r) {
                        if (r.status === 501) {
                            document.getElementById('msg').textContent = '保存到 Git 功能开发中，请稍后再试';
                            return;
                        }
                        return r.ok ? r.json() : Promise.reject();
                    })
                    .then(function (d) {
                        if (d !== undefined) document.getElementById('msg').textContent = '已保存到 Git 仓库';
                    })
                    .catch(function () { document.getElementById('msg').textContent = '保存到 Git 失败'; });
            };
            fetch('/api/instances/' + id + '/coding-guide').then(r => r.ok ? r.json() : {}).then(d => {
                if (d.ready) {
                    var el = document.getElementById('codingGuide');
                    el.style.display = 'block';
                    el.innerHTML = '<strong>编码就绪</strong>: ' + d.message + (d.tasksPath ? ' <br>tasks: <code>' + d.tasksPath + '</code>' : '');
                }
            });
        }
    </script>
</body>
</html>
