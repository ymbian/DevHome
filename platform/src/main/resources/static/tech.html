<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>技改任务 · 平台</title>
    <link rel="stylesheet" href="/common.css">
    <style>
        .type-tabs { display: flex; flex-wrap: wrap; align-items: center; gap: 0.25rem; margin: 0.5rem 0; }
        .type-tabs .tab { padding: 0.4rem 0.75rem; font-size: 0.9rem; border: none; border-radius: 6px; background: #f0f2f5; color: var(--color-text); cursor: pointer; text-decoration: none; }
        .type-tabs .tab:hover { background: #e5e7eb; }
        .type-tabs .tab.active { background: var(--color-primary); color: #fff; }
        .type-tabs .tab-break { flex-basis: 100%; height: 0; }
        .type-tabs .tab-refresh {
            order: 999;
            width: auto;
            text-align: center;
            margin-left: auto;
            margin-top: 0.25rem;
            background: var(--color-primary);
            color: #fff;
        }
        .type-tabs .tab-refresh:hover { background: var(--color-primary-hover); }
        #message, #result { margin: 0.75rem 0; padding: 0.5rem; border-radius: 6px; font-size: 0.9rem; }
        #result.success { background: #e8f5e9; }
        #result.error { background: #ffebee; }
        .item { display: flex; align-items: flex-start; gap: 0.5rem; }
        .item .body { flex: 1; }
    </style>
</head>
<body>
    <aside class="app-sidebar">
        <nav>
            <a href="/" data-nav="dev">开发</a>
            <a href="/tech.html" data-nav="tech">技改</a>
            <a href="/work-plan.html" data-nav="work-plan">工作计划</a>
        </nav>
    </aside>
    <main class="app-main">
        <div class="site-theme">欢迎来到DevHome，开发者之家</div>
        <h1>技改任务</h1>
        <p>按类型筛选查看任务列表。</p>
        <div class="type-tabs" id="typeTabs">
            <button type="button" class="tab active" data-type="" aria-pressed="true">全部</button>
            <span class="tab-break" aria-hidden="true"></span>
            <button type="button" class="tab tab-refresh" id="refresh">刷新</button>
        </div>
        <div id="message"></div>
        <div id="result"></div>
        <div class="list">
            <h2>任务列表</h2>
            <div id="taskList"></div>
        </div>
    </main>
    <script src="/shell.js"></script>
    <script>
        const api = '/api/tech-improvement';
        var selectedType = '';
        const typeTabsEl = document.getElementById('typeTabs');
        const taskList = document.getElementById('taskList');
        const messageEl = document.getElementById('message');
        const resultEl = document.getElementById('result');

        function loadTypes() {
            fetch(api + '/tasks/types').then(r => r.json()).then(types => {
                var html = '<button type="button" class="tab active" data-type="">全部</button>';
                types.forEach(function (t) {
                    html += '<button type="button" class="tab" data-type="' + escapeHtml(t.value) + '">' + escapeHtml(t.label || t.value) + '</button>';
                });
                html += '<span class="tab-break" aria-hidden="true"></span>';
                html += '<button type="button" class="tab tab-refresh" id="refresh">刷新</button>';
                typeTabsEl.innerHTML = html;
                typeTabsEl.querySelectorAll('.tab').forEach(function (tab) {
                    tab.addEventListener('click', function () { setType(tab.getAttribute('data-type') || ''); });
                });
                document.getElementById('refresh').onclick = loadTasks;
                setType('');
            });
        }
        function setType(type) {
            selectedType = type;
            typeTabsEl.querySelectorAll('.tab').forEach(function (tab) {
                var isActive = (tab.getAttribute('data-type') || '') === (type || '');
                tab.classList.toggle('active', isActive);
                tab.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });
            loadTasks();
        }
        function loadTasks() {
            const url = selectedType ? api + '/tasks?type=' + encodeURIComponent(selectedType) : api + '/tasks';
            fetch(url).then(r => r.json()).then(list => {
                if (!list.length) { taskList.innerHTML = '<p>暂无任务</p>'; return; }
                // Optional follow-up: add .staged-progress per row when API returns pipeline stageIndex/status (see index.html renderStagedProgress).
                taskList.innerHTML = list.map(t => {
                    var appName = t.applicationName != null ? t.applicationName : t.title;
                    var issueDesc = t.issueDescription != null ? t.issueDescription : t.description;
                    var deadlineStr = t.deadline ? ' · 截止: ' + t.deadline : '';
                    var meta = (t.typeLabel || t.type) + (t.priority ? ' · ' + t.priority : '') + (t.status ? ' · ' + t.status : '') + deadlineStr;
                    var descPreview = issueDesc ? escapeHtml(issueDesc.substring(0, 120)) + (issueDesc.length > 120 ? '…' : '') : '暂无描述';
                    return '<div class="item">' +
                        '<div class="body">' +
                        '<strong>' + escapeHtml(appName) + '</strong>' +
                        ' <span class="meta">' + meta + '</span>' +
                        '<div class="meta">' + descPreview + '</div>' +
                        (t.pipelineInstanceId ? ' <a href="/design.html?id=' + encodeURIComponent(t.pipelineInstanceId) + '">查看设计</a>' : '') +
                        '</div></div>';
                }).join('');
            }).catch(() => { taskList.innerHTML = '<p>加载失败</p>'; });
        }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
        function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

        loadTypes();
    </script>
</body>
</html>
