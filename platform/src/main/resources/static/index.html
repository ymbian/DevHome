<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>需求到编码 · 平台</title>
    <link rel="stylesheet" href="/common.css">
    <style>
        .btn-upload { margin-right: 0.5rem; background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
        .btn-upload:hover { background: #e5e7eb; border-color: #9ca3af; }
        .staged-progress { display: flex; align-items: center; gap: 2px; margin-top: 0.35rem; flex-wrap: wrap; }
        .staged-progress-seg { padding: 2px 6px; border-radius: 4px; font-size: 11px; color: #6b7280; background: #e5e7eb; }
        .staged-progress-seg.done { background: #10b981; color: #fff; }
        .staged-progress-seg.current { background: #3b82f6; color: #fff; font-weight: 600; }
        .staged-progress-seg.pending { background: #e5e7eb; color: #9ca3af; }
        .link-delete { color: #dc2626; }
        .link-delete:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <aside class="app-sidebar">
        <nav>
            <a href="/" data-nav="dev">开发</a>
            <a href="/tech.html" data-nav="tech">技改</a>
            <a href="/work-plan.html" data-nav="work-plan">工作计划</a>
        </nav>
    </aside>
    <main class="app-main">
        <div class="site-theme">欢迎来到DevHome，开发者之家</div>
        <h1>需求描述</h1>
        <p>输入自然语言需求，提交后将生成设计文档、spec文档，并驱动 IDE、 流水线</p>
        <textarea id="requirement" placeholder="例如：为内部系统增加用户登录与角色权限管理..."></textarea>
        <br>
        <input type="file" id="requirementFile" accept=".txt,.md,text/*" style="display: none;">
        <button type="button" id="uploadRequirement" class="btn btn-upload">上传特性文档</button>
        <button id="submit" class="btn">提交</button>
        <div id="message"></div>
        <div class="list">
            <h2>历史</h2>
            <div id="history"></div>
        </div>
    </main>
    <script src="/shell.js"></script>
    <script>
        const api = '/api';
        const historyCache = {};
        document.getElementById('uploadRequirement').onclick = function () { document.getElementById('requirementFile').click(); };

        document.getElementById('requirementFile').onchange = function () {
            var input = this;
            var file = input.files && input.files[0];
            input.value = '';
            if (!file) return;
            var maxSize = 1024 * 1024;
            if (file.size > maxSize) {
                document.getElementById('message').textContent = '文件过大，请选择 1MB 以内的文本文件';
                return;
            }
            var reader = new FileReader();
            reader.onload = function () {
                document.getElementById('requirement').value = reader.result;
                document.getElementById('message').textContent = '已加载文件内容';
            };
            reader.onerror = function () { document.getElementById('message').textContent = '无法读取该文件'; };
            reader.readAsText(file, 'UTF-8');
        };

        document.getElementById('submit').onclick = function () {
            const text = document.getElementById('requirement').value.trim();
            if (!text) { document.getElementById('message').textContent = '请输入需求描述'; return; }
            document.getElementById('message').textContent = '提交中...';
            fetch(api + '/requirements', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            }).then(r => r.ok ? r.json() : Promise.reject()).then(d => {
                document.getElementById('message').textContent = '已创建流水线: ' + d.id;
                document.getElementById('requirement').value = '';
                loadHistory();
            }).catch(() => { document.getElementById('message').textContent = '提交失败'; });
        };

        function loadHistory() {
            fetch(api + '/requirements').then(r => r.json()).then(list => {
                const el = document.getElementById('history');
                if (!list.length) {
                    el.innerHTML = '<p>暂无记录</p>';
                    return;
                }
                el.innerHTML = list.map(i => '<div class="item" data-id="' + escapeAttr(i.id) + '">' +
                    '<strong>' + i.id + '</strong> <small>' + i.createdAt + ' · ' + i.status + '</small>' +
                    '<br><span>' + escapeHtml(i.excerpt) + '</span>' +
                    '<div class="staged-progress">' + renderStagedProgress(statusToStep(i.status)) + '</div>' +
                    ' <a href="#" data-id="' + escapeAttr(i.id) + '">查看</a> <a href="/design.html?id=' + encodeURIComponent(i.id) + '">设计</a> ' +
                    '<a href="#" class="link-delete" data-id="' + escapeAttr(i.id) + '">删除</a>' +
                    '</div>').join('');
                list.forEach(i => { historyCache[i.id] = i; });
                el.querySelectorAll('a[data-id]').forEach(a => {
                    if (a.classList.contains('link-delete')) {
                        a.onclick = function (e) { e.preventDefault(); deleteRequirement(this.dataset.id); };
                    } else {
                        a.onclick = function (e) { e.preventDefault(); viewRequirement(this.dataset.id); };
                    }
                });
            });
        }
        function statusToStep(status) {
            var s = (status || '').toUpperCase();
            if (s === 'SUBMITTED') return 1;
            if (s === 'DESIGN_GENERATED') return 2;
            if (s === 'ARTIFACTS_READY') return 3;
            if (s === 'CODING_READY') return 4;
            if (s === 'FAILED') return 2;
            return 1;
        }
        var STAGE_LABELS = ['需求提交', '设计', '制品', '编码'];
        function renderStagedProgress(stepIndex) {
            var step = Math.min(Math.max(1, stepIndex), 4);
            var html = '';
            for (var i = 1; i <= 4; i++) {
                var cls = 'staged-progress-seg';
                if (i < step) cls += ' done';
                else if (i === step && step < 4) cls += ' current';
                else if (i === step && step === 4) cls += ' done';
                else cls += ' pending';
                html += '<span class="' + cls + '" title="' + escapeHtml(STAGE_LABELS[i - 1]) + '">' + escapeHtml(STAGE_LABELS[i - 1]) + '</span>';
            }
            return html;
        }
        function viewRequirement(id) {
            fetch(api + '/requirements/' + id).then(r => r.json()).then(d => {
                document.getElementById('requirement').value = d.text;
                document.getElementById('message').textContent = '已加载: ' + d.id + ' (可编辑后重新提交为新实例)';
            });
        }
        function deleteRequirement(id) {
            if (!confirm('确定删除该条记录？删除后无法恢复。')) return;
            fetch(api + '/requirements/' + encodeURIComponent(id), { method: 'DELETE' }).then(function (r) {
                if (r.status === 204 || r.ok) {
                    document.getElementById('message').textContent = '已删除';
                    delete historyCache[id];
                    loadHistory();
                } else {
                    document.getElementById('message').textContent = '删除失败';
                }
            }).catch(function () { document.getElementById('message').textContent = '删除失败'; });
        }
        function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        loadHistory();
    </script>
</body>
</html>
